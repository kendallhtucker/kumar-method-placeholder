<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- 1200x630 source for og-image.png. Screenshot this at 1200x630. -->
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;0,6..96,900;1,6..96,900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(120% 90% at 50% 38%, #161313 0%, #000 72%);
      color: #f5f3ef;
      font-family: "Helvetica Neue", Arial, sans-serif;
      text-align: center;
    }
    .top { font-size: 18px; font-weight: 700; letter-spacing: 0.36em; color: rgba(245,243,239,0.55); margin-bottom: 26px; }
    .logo { font-family: "Bodoni Moda", "Times New Roman", serif; font-weight: 900; color: #e8121d; line-height: 0.8; text-transform: uppercase; letter-spacing: -0.01em; }
    .logo .l1 { font-size: 96px; }
    .logo .l2 { font-size: 168px; }
    .logo .l3 { font-size: 96px; }
    .tag { margin-top: 30px; font-size: 20px; font-weight: 700; letter-spacing: 0.4em; text-transform: uppercase; }
    .date { margin-top: 22px; font-family: "Bodoni Moda", serif; font-weight: 700; font-size: 30px; letter-spacing: 0.12em; }
  </style>
</head>
<body>
  <div class="top">EST. 2026 &nbsp; &mdash; &nbsp; NEW YORK CITY</div>
  <div class="logo">
    <div class="l1">THE</div>
    <div class="l2">KUMAR</div>
    <div class="l3">METHOD</div>
  </div>
  <div class="tag">CHANGING THE ACCOUNTING GAME</div>
  <div class="date">COMING &mdash; 07 . 10 . 2026</div>
</body>
</html>
